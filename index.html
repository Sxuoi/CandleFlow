<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CandleFlow — Offline Charting &amp; Backtesting</title>
  <meta name="description" content="TradingView-style charting and manual backtesting tool. Load your own MT5 CSV data — everything stays in your browser, nothing is ever transmitted.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- TradingView Lightweight Charts v4 -->
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════ Top Bar ═══════════ -->
  <header id="top-bar">
    <div id="symbol-info">
      <span id="symbol-name">—</span>
      <div id="timeframe-selector" class="timeframe-group">
        <button class="tf-btn" data-tf="M1">1m</button>
        <button class="tf-btn" data-tf="M5">5m</button>
        <button class="tf-btn" data-tf="M15">15m</button>
        <button class="tf-btn" data-tf="M30">30m</button>
        <button class="tf-btn" data-tf="H1">1h</button>
        <button class="tf-btn" data-tf="H4">4h</button>
        <button class="tf-btn" data-tf="D1">1D</button>
        <button class="tf-btn" data-tf="W1">1W</button>
      </div>
    </div>
    <div id="bar-actions">
      <button id="btn-replay" title="Bar Replay">⏪ Replay</button>
      <button id="btn-indicators" title="Indicators">📊 Indicators</button>
      <button id="btn-load-test" title="Load sample XAUUSD M1 CSV">🧪 Test CSV</button>
      <button id="btn-open-file" title="Open CSV file">📂 Open</button>
      <button id="btn-edit-meta" title="Edit symbol / timeframe" disabled>✏️</button>
    </div>
  </header>

  <div id="app-container">
    <!-- ═══════════ Left Drawing Toolbar ═══════════ -->
    <nav id="drawing-toolbar">
      <button class="tool-btn active" data-tool="cursor" title="Cursor (Crosshair)">🖱️</button>
      <button class="tool-btn" data-tool="trend" title="Trend Line (Alt+T)">↗️</button>
      <button class="tool-btn" data-tool="info_line" title="Info Line">ℹ️</button>
      <button class="tool-btn" data-tool="ray" title="Ray">➡️</button>
      <button class="tool-btn" data-tool="extended" title="Extended Line">↔️</button>
      <button class="tool-btn" data-tool="trend_angle" title="Trend Angle">📐</button>
      <button class="tool-btn" data-tool="horizontal_line" title="Horizontal Line (Alt+H)">➖</button>
      <button class="tool-btn" data-tool="horizontal_ray" title="Horizontal Ray (Alt+J)">⇾</button>
      <button class="tool-btn" data-tool="vertical_line" title="Vertical Line (Alt+V)">⎸</button>
      <button class="tool-btn" data-tool="crossline" title="Crossline (Alt+C)">➕</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="fib" title="Fibonacci Retracement">📶</button>
      <button class="tool-btn" data-tool="cyclic" title="Cyclic Lines">🔂</button>
      <button class="tool-btn" data-tool="long_position" title="Long Position">🟢</button>
      <button class="tool-btn" data-tool="short_position" title="Short Position">🔴</button>
      <button class="tool-btn" data-tool="rectangle" title="Rectangle">⬜</button>
      <button class="tool-btn" data-tool="circle" title="Circle / Ellipse">⭕</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="path" title="Path (Multi-point)">〰️</button>
      <button class="tool-btn" data-tool="brush" title="Brush (Freehand)">🖌️</button>
      <button class="tool-btn" data-tool="text" title="Text Annotation">🔤</button>
      <button class="tool-btn" data-tool="ruler" title="Ruler / Measure">📏</button>
      <button class="tool-btn" data-tool="zoom" title="Zoom Box">🔍</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="btn-toggle-magnet" title="Magnet Snap Mode">🧲</button>
      <button class="tool-btn" id="btn-toggle-lock" title="Lock All Drawings">🔓</button>
      <button class="tool-btn" id="btn-toggle-visibility" title="Hide All Drawings">👁️</button>
      <button class="tool-btn" id="btn-clear-drawings" title="Clear All Drawings">🗑️</button>
    </nav>

    <!-- ═══════════ Chart Area ═══════════ -->
    <main id="chart-wrapper">
      <div id="chart-container"></div>
      <canvas id="drawing-canvas"></canvas>

      <!-- OHLCV legend (updated on crosshair move) -->
      <div id="chart-legend"></div>
      <!-- Indicator values legend (updated on crosshair move) -->
      <div id="indicator-legend"></div>

      <!-- Drag-and-drop overlay -->
      <div id="drop-zone" class="hidden">
        <div class="drop-zone-inner">
          <div class="drop-icon">📄</div>
          <p>Drop your MT5 CSV file here</p>
        </div>
      </div>

      <!-- Demo data banner (shown until user loads their own CSV) -->
      <div id="demo-banner" class="hidden">
        <span>📊 Viewing demo data</span>
        <span class="demo-sep">—</span>
        <button id="btn-open-file-hero" class="btn-primary btn-sm">Open your CSV</button>
        <span class="demo-sep">or drag &amp; drop anywhere</span>
      </div>
    </main>

    <!-- ═══════════ Right Sidebar ═══════════ -->
    <aside id="sidebar" class="collapsed">
      <div class="sidebar-header">
        <h3>Stored Datasets</h3>
        <button id="btn-close-sidebar" title="Close Panel">✕</button>
      </div>
      <div class="sidebar-content">
        <div id="datasets-list-empty" class="empty-list-msg">
          <p>No stored datasets found.</p>
          <p class="sub">Import MT5 CSV data to save it locally.</p>
        </div>
        <ul id="datasets-list" class="datasets-ul"></ul>
      </div>
      <!-- Mock Actions for testing userState persistence in Phase 6 -->
      <div class="sidebar-footer">
        <button id="btn-mock-save" class="btn-primary btn-sm" title="Simulate saving drawings and indicators for the active dataset">🧪 Save Mock Drawings State</button>
      </div>
    </aside>

    <!-- ═══════════ Right Toolbar ═══════════ -->
    <nav id="right-toolbar">
      <button id="btn-toggle-datasets" title="Stored Datasets" class="toolbar-btn">
        📁
      </button>
    </nav>
  </div>

  <!-- ═══════════ Notifications ═══════════ -->
  <div id="notifications"></div>

  <!-- ═══════════ Meta Override Modal ═══════════ -->
  <dialog id="meta-modal">
    <form method="dialog">
      <h3>Dataset Info</h3>
      <label>
        Symbol
        <input type="text" id="input-symbol" placeholder="e.g. XAUUSD" autocomplete="off" spellcheck="false">
      </label>
      <label>
        Timeframe
        <select id="input-timeframe">
          <option value="M1">M1 (1 Minute)</option>
          <option value="M5">M5 (5 Minutes)</option>
          <option value="M15">M15 (15 Minutes)</option>
          <option value="M30">M30 (30 Minutes)</option>
          <option value="H1">H1 (1 Hour)</option>
          <option value="H4">H4 (4 Hours)</option>
          <option value="D1">D1 (Daily)</option>
          <option value="W1">W1 (Weekly)</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="submit" value="cancel">Cancel</button>
        <button type="submit" value="confirm" class="btn-primary">Confirm</button>
      </div>
    </form>
  </dialog>

  <!-- ═══════════ Indicator Settings Modal ═══════════ -->
  <dialog id="indicator-modal">
    <div class="ind-modal-content">
      <div class="ind-modal-header">
        <h3>Indicators</h3>
        <button id="btn-close-ind-modal" class="ind-modal-close" title="Close">✕</button>
      </div>

      <div class="ind-modal-body">
        <!-- Add Indicator Section -->
        <div class="ind-add-section">
          <div class="ind-add-grid">
            <button class="ind-add-btn" data-ind-type="SMA">
              <span class="ind-add-icon" style="color:#2962FF">━</span>
              <span class="ind-add-label">SMA</span>
            </button>
            <button class="ind-add-btn" data-ind-type="EMA">
              <span class="ind-add-icon" style="color:#FF9800">━</span>
              <span class="ind-add-label">EMA</span>
            </button>
            <button class="ind-add-btn" data-ind-type="RSI">
              <span class="ind-add-icon" style="color:#7B1FA2">〰</span>
              <span class="ind-add-label">RSI</span>
            </button>
            <button class="ind-add-btn" data-ind-type="MACD">
              <span class="ind-add-icon" style="color:#2962FF">📊</span>
              <span class="ind-add-label">MACD</span>
            </button>
            <button class="ind-add-btn" data-ind-type="BB">
              <span class="ind-add-icon" style="color:#9C27B0">⟨⟩</span>
              <span class="ind-add-label">Bollinger</span>
            </button>
            <button class="ind-add-btn" data-ind-type="VWAP">
              <span class="ind-add-icon" style="color:#FFD600">━</span>
              <span class="ind-add-label">VWAP</span>
            </button>
            <button class="ind-add-btn" data-ind-type="TIME_SEP">
              <span class="ind-add-icon" style="color:#787b86">┃</span>
              <span class="ind-add-label">Time Sep</span>
            </button>
            <button class="ind-add-btn" data-ind-type="VOLUME">
              <span class="ind-add-icon" style="color:#26a69a">▮</span>
              <span class="ind-add-label">Volume</span>
            </button>
          </div>
        </div>

        <!-- Active Indicators List -->
        <div class="ind-active-section">
          <h4>Active Indicators</h4>
          <ul id="ind-active-list" class="ind-active-list">
            <li class="ind-empty-msg">No indicators active</li>
          </ul>
        </div>
      </div>
    </div>
  </dialog>

  <!-- ═══════════ Loading Overlay ═══════════ -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p id="loading-text">Parsing CSV…</p>
  </div>

  <!-- ═══════════ App Entry Point ═══════════ -->
  <script type="module" src="js/app.js?v=6"></script>

</body>
</html>
